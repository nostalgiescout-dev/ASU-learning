{% extends 'base.html' %}
{% block content %}
<div class="max-w-xl mx-auto p-6 bg-white rounded shadow">
  <h2 class="text-2xl font-bold mb-4">{{ _('Upload Content') }}</h2>
  <form method="post" enctype="multipart/form-data">
    <div class="mb-4">
      <label class="block mb-1">{{ _('Title') }}</label>
      <input type="text" name="title" class="w-full border rounded p-2" required>
    </div>
    <div class="mb-4">
      <label class="block mb-1">{{ _('Description') }}</label>
      <textarea name="description" class="w-full border rounded p-2"></textarea>
    </div>
    <div class="mb-4">
      <label class="block mb-1">{{ _('Type') }}</label>
      <select name="type" class="w-full border rounded p-2" required>
        <option value="video">{{ _('Video') }}</option>
        <option value="reel">{{ _('Reel') }}</option>
        <option value="book">{{ _('Book') }}</option>
      </select>
    </div>
    <div class="mb-4">
      <label class="block mb-1">{{ _('File') }}</label>
      <input type="file" name="file" class="w-full" required>
    </div>
    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">{{ _('Upload') }}</button>
  </form>
</div>
{% endblock %}
