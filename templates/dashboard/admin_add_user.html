{% extends "base.html" %}
{% block title %}Add User{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-6 lg:px-8">
  <div class="mb-6 flex items-center justify-between gap-4">
    <div>
      <h1 class="font-display font-800 text-2xl text-slate-900">Add User</h1>
      <p class="text-sm text-slate-500">Create a new account and choose the access role.</p>
    </div>
    <a href="{{ url_for('admin.dashboard') }}" class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 transition hover:border-primary-300">
      Back
    </a>
  </div>

  <div class="card p-6">
    <form method="POST" action="{{ url_for('admin.add_user') }}" class="space-y-5">
      <div class="grid gap-4 md:grid-cols-2">
        <div>
          <label class="mb-1 block text-xs font-semibold text-slate-600">Username *</label>
          <input type="text" name="username" required value="{{ form_data.get('username', '') }}"
                 class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary-400"
                 placeholder="new_user" />
        </div>
        <div>
          <label class="mb-1 block text-xs font-semibold text-slate-600">Full Name</label>
          <input type="text" name="full_name" value="{{ form_data.get('full_name', '') }}"
                 class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary-400"
                 placeholder="Full name" />
        </div>
      </div>

      <div class="grid gap-4 md:grid-cols-2">
        <div>
          <label class="mb-1 block text-xs font-semibold text-slate-600">Email *</label>
          <input type="email" name="email" required value="{{ form_data.get('email', '') }}"
                 class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary-400"
                 placeholder="user@example.com" />
        </div>
        <div>
          <label class="mb-1 block text-xs font-semibold text-slate-600">Password *</label>
          <input type="password" name="password" required minlength="6"
                 class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary-400"
                 placeholder="Minimum 6 characters" />
        </div>
      </div>

      <div class="grid gap-4 md:grid-cols-3">
        <div>
          <label class="mb-1 block text-xs font-semibold text-slate-600">Role</label>
          <select name="role"
                  class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary-400">
            {% set selected_role = form_data.get('role', 'scout') %}
            <option value="scout" {{ 'selected' if selected_role == 'scout' else '' }}>Scout</option>
            <option value="instructor" {{ 'selected' if selected_role == 'instructor' else '' }}>Instructor</option>
            <option value="admin" {{ 'selected' if selected_role == 'admin' else '' }}>Admin</option>
          </select>
        </div>
        <div>
          <label class="mb-1 block text-xs font-semibold text-slate-600">Language</label>
          {% set selected_lang = form_data.get('lang', 'en') %}
          <select name="lang"
                  class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary-400">
            <option value="en" {{ 'selected' if selected_lang == 'en' else '' }}>English</option>
            <option value="fr" {{ 'selected' if selected_lang == 'fr' else '' }}>French</option>
            <option value="ar" {{ 'selected' if selected_lang == 'ar' else '' }}>Arabic</option>
            <option value="es" {{ 'selected' if selected_lang == 'es' else '' }}>Spanish</option>
          </select>
        </div>
        <div>
          <label class="mb-1 block text-xs font-semibold text-slate-600">Scout Unit</label>
          <input type="text" name="scout_unit" value="{{ form_data.get('scout_unit', '') }}"
                 class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary-400"
                 placeholder="City Group" />
        </div>
      </div>

      <div class="flex justify-end gap-3 pt-2">
        <a href="{{ url_for('admin.dashboard') }}" class="rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-600 transition hover:border-primary-300">
          Cancel
        </a>
        <button type="submit" class="rounded-xl bg-primary-600 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-primary-700">
          Create User
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
