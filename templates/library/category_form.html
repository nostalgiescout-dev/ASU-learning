{% extends "base.html" %}

{% block title %}{{ _('Edit Category') }} - {{ _('Only Scouts Academy') }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-6 lg:px-8">
  <div class="mb-6 flex items-center justify-between gap-4">
    <div>
      <h1 class="font-display font-800 text-2xl text-slate-900">{{ _('Edit Category') }}</h1>
      <p class="mt-1 text-sm text-slate-500">{{ _('Update the category name and description used in the library.') }}</p>
    </div>
    <a href="{{ url_for('library.manage_categories') }}" class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 transition hover:border-primary-300">
      Back to Categories
    </a>
  </div>

  <div class="card p-6">
    <form method="POST" class="space-y-5">
      <div>
        <label class="mb-1.5 block text-sm font-semibold text-slate-700">{{ _('Category Name') }}</label>
        <input type="text" name="name" value="{{ category.name }}" required class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary-400" />
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-semibold text-slate-700">{{ _('Description') }}</label>
        <textarea name="description" rows="5" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary-400">{{ category.description or '' }}</textarea>
      </div>
      <div class="flex justify-end gap-3">
        <a href="{{ url_for('library.manage_categories') }}" class="rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-600 transition hover:border-primary-300">{{ _('Cancel') }}</a>
        <button type="submit" class="rounded-xl bg-primary px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-blue-700">Save Category</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
