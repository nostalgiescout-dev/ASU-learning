version: "3.9"

services:
  web:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env            # secrets live here, never committed to git
    environment:
      FLASK_ENV: production
      KECHAFA_DB: /data/kechafa.db
    volumes:
      - db_data:/data   # SQLite database persists across redeploys
    restart: unless-stopped

volumes:
  db_data:
