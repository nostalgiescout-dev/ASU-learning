name: CI / CD

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-cov
      - run: PYTHONPATH=. pytest tests --maxfail=1 --disable-warnings -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            APP_DIR="/var/www/ASU-Learning"

            # Clone on first deploy, pull on subsequent deploys
            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
            else
              cd "$APP_DIR" && git pull origin main
            fi

            cd "$APP_DIR"

            # Create venv if missing
            if [ ! -f "$APP_DIR/venv/bin/python" ]; then
              python3 -m venv "$APP_DIR/venv"
            fi

            "$APP_DIR/venv/bin/pip" install --upgrade pip --quiet
            "$APP_DIR/venv/bin/pip" install -r requirements.txt --quiet

            chown -R www-data:www-data "$APP_DIR"

            systemctl restart elearning
            systemctl reload nginx
            echo "Deploy complete — $(date)"
