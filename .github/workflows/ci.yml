name: CI / CD

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-cov
      - run: PYTHONPATH=. pytest tests --maxfail=1 --disable-warnings -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            APP_DIR="/var/www/ASU-Learning"

            # ── 0. Allow git to operate in this directory regardless of owner ──
            git config --global --add safe.directory "$APP_DIR"

            # ── 1. Clone on first deploy, pull on subsequent deploys ──────────
            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
            else
              cd "$APP_DIR" && git pull origin main
            fi
            cd "$APP_DIR"

            # ── 2. Install systemd service file ───────────────────────────────
            cp "$APP_DIR/elearning.service" /etc/systemd/system/elearning.service
            systemctl daemon-reload
            systemctl enable elearning

            # ── 3. Install Nginx config ───────────────────────────────────────
            cp "$APP_DIR/nginx.conf" /etc/nginx/sites-available/elearning
            ln -sf /etc/nginx/sites-available/elearning /etc/nginx/sites-enabled/elearning
            rm -f /etc/nginx/sites-enabled/default
            nginx -t

            # ── 4. Create venv if missing ─────────────────────────────────────
            if [ ! -f "$APP_DIR/venv/bin/python" ]; then
              python3 -m venv "$APP_DIR/venv"
            fi
            "$APP_DIR/venv/bin/pip" install --upgrade pip --quiet
            "$APP_DIR/venv/bin/pip" install gunicorn --quiet
            "$APP_DIR/venv/bin/pip" install -r requirements.txt --quiet

            # ── 5. Fix ownership ──────────────────────────────────────────────
            mkdir -p /var/log/ASU-Learning
            chown www-data:www-data /var/log/ASU-Learning
            chown -R www-data:www-data "$APP_DIR"

            # ── 6. Restart Gunicorn ───────────────────────────────────────────
            systemctl restart elearning

            # ── 7. Start or reload Nginx ──────────────────────────────────────
            if systemctl is-active --quiet nginx; then
              systemctl reload nginx
            else
              systemctl start nginx
            fi

            echo "Deploy complete — $(date)"
