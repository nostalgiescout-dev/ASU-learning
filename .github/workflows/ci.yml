name: CI / CD

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-cov
      - run: PYTHONPATH=. pytest tests --maxfail=1 --disable-warnings -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            APP_DIR="/var/www/ASU-Learning"
            SERVICE="elearning"
            DOMAIN="kachafafaqat.com"

            # ── 0. Install system packages ────────────────────────────────────
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y -qq git python3 python3-venv python3-pip nginx certbot

            # ── 1. Git safe directory ─────────────────────────────────────────
            git config --global --add safe.directory "$APP_DIR"

            # ── 2. Clone on first deploy, pull on subsequent deploys ──────────
            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
            else
              cd "$APP_DIR" && git pull origin main
            fi
            cd "$APP_DIR"

            # ── 3. Verify .env exists (must be uploaded manually once) ────────
            if [ ! -f "$APP_DIR/.env" ]; then
              echo "ERROR: $APP_DIR/.env not found."
              echo "Run this once: scp .env root@$DOMAIN:$APP_DIR/.env"
              exit 1
            fi

            # ── 4. Get SSL certificate if not already issued ──────────────────
            CERT="/etc/letsencrypt/live/$DOMAIN/fullchain.pem"
            if [ ! -f "$CERT" ]; then
              systemctl stop nginx 2>/dev/null || true
              certbot certonly --standalone \
                -d "$DOMAIN" -d "www.$DOMAIN" \
                --non-interactive --agree-tos \
                --email alawiahmwdhadrami@gmail.com
            fi

            # ── 5. Install systemd service file ───────────────────────────────
            cp "$APP_DIR/$SERVICE.service" /etc/systemd/system/$SERVICE.service
            sed -i 's/\r//' /etc/systemd/system/$SERVICE.service
            systemctl daemon-reload
            systemctl enable $SERVICE

            # ── 6. Install Nginx config ───────────────────────────────────────
            cp "$APP_DIR/nginx.conf" /etc/nginx/sites-available/$SERVICE
            sed -i 's/\r//' /etc/nginx/sites-available/$SERVICE
            rm -f /etc/nginx/sites-enabled/*
            ln -sf /etc/nginx/sites-available/$SERVICE /etc/nginx/sites-enabled/$SERVICE
            nginx -t

            # ── 7. Create venv and install dependencies ───────────────────────
            if [ ! -f "$APP_DIR/venv/bin/python" ]; then
              python3 -m venv "$APP_DIR/venv"
            fi
            "$APP_DIR/venv/bin/pip" install --upgrade pip --quiet
            "$APP_DIR/venv/bin/pip" install gunicorn --quiet
            "$APP_DIR/venv/bin/pip" install -r "$APP_DIR/requirements.txt" --quiet

            # ── 8. Fix ownership and log directory ────────────────────────────
            mkdir -p /var/log/ASU-Learning
            chown www-data:www-data /var/log/ASU-Learning
            chown -R www-data:www-data "$APP_DIR"

            # ── 9. Start / restart Gunicorn ───────────────────────────────────
            systemctl restart $SERVICE

            # ── 10. Start or reload Nginx ─────────────────────────────────────
            if systemctl is-active --quiet nginx; then
              systemctl reload nginx
            else
              systemctl start nginx
            fi

            echo "=========================================="
            echo " Deploy complete — $(date)"
            echo " Site: https://$DOMAIN"
            echo "=========================================="
